---
name: '02 🔎 Static analysis'

# yamllint disable-line rule:truthy
on:
  workflow_run:
    workflows: [ '01 🚧 Build and test' ]
    types:
      - completed

env:
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
  OSS_INDEX_USER: ${{ secrets.OSS_INDEX_USER }}
  OSS_INDEX_API_KEY: ${{ secrets.OSS_INDEX_API_KEY }}

# actions: read — restore actions/cache when org default token is restricted
permissions:
  contents: read
  actions: read

jobs:
  static-analysis:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.actor != 'renovate[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/tools
      - uses: actions/cache/restore@v5
        with:
          path: .dependency-check-cache
          key: dependency-check-${{ runner.os }}-v2
          restore-keys: |
            dependency-check-${{ runner.os }}-

      - run: task build:sa
