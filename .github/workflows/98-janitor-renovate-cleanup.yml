---
name: 98 🧹 Janitor renovate cleanup
# yamllint disable-line rule:truthy
on:
  # Monthly after Renovate (1st) and CI skips settle; 5th UTC morning
  schedule:
    - cron: '0 8 5 * *'

jobs:
  delete_skipped:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Delete skipped renovate workflow runs
        uses: Mattraks/delete-workflow-runs@v2.1.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: get-forge/forge-kit
          delete_workflow_pattern: "00 🧩 Hygiene checks|03 👊🏽 Auto version bump"
          delete_run_by_conclusion_pattern: skipped
          retain_days: 0
          keep_minimum_runs: 0
