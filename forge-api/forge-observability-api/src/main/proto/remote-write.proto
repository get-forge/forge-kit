// Prometheus Remote Write 1.0 wire format (subset).
// Source: https://prometheus.io/docs/specs/prw/remote_write_spec/
syntax = "proto3";

package io.forge.kit.observability.api.remotewrite;

option java_package = "io.forge.kit.observability.api.remotewrite";
option java_multiple_files = true;

message WriteRequest {
  repeated TimeSeries timeseries = 1;
}

message TimeSeries {
  repeated Label labels = 1;
  repeated Sample samples = 2;
}

message Label {
  string name = 1;
  string value = 2;
}

message Sample {
  double value = 1;
  int64 timestamp = 2;
}
